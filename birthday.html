<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>郑云潇生日快乐 🎂</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0015;
    overflow: hidden;
    font-family: 'Georgia', serif;
    width: 100vw;
    height: 100vh;
    position: relative;
  }

  /* ===== 星空背景 ===== */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.1; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.4); }
  }

  /* ===== 多语言小字浮动 ===== */
  .words-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .word {
    position: absolute;
    font-size: clamp(10px, 1.2vw, 16px);
    font-weight: 300;
    opacity: 0;
    animation: floatWord var(--dur2) linear infinite;
    animation-delay: var(--delay);
    white-space: nowrap;
    filter: blur(0.3px);
  }
  @keyframes floatWord {
    0%   { opacity: 0;   transform: translateY(0) scale(0.8); }
    10%  { opacity: 0.7; }
    80%  { opacity: 0.5; }
    100% { opacity: 0;   transform: translateY(-120px) scale(1.1); }
  }

  /* ===== 彩带粒子 ===== */
  .confetti-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .confetti {
    position: absolute;
    width: 8px;
    height: 14px;
    opacity: 0;
    animation: confettiFall var(--dur3) linear infinite;
    animation-delay: var(--delay3);
    border-radius: 2px;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; top: -20px; transform: rotate(0deg) translateX(0); }
    100% { opacity: 0.3; top: 110vh; transform: rotate(720deg) translateX(var(--dx)); }
  }

  /* ===== 中心内容 ===== */
  .center {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  /* 主标题 */
  .main-title {
    font-size: clamp(36px, 6vw, 80px);
    font-weight: 900;
    text-align: center;
    line-height: 1.2;
    background: linear-gradient(90deg, #ff6ec7, #ffe06e, #6ecfff, #ff6ec7);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite, pulse 2s ease-in-out infinite;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(255,110,199,0.8));
    letter-spacing: 4px;
  }
  /* 生日快乐 */
  .birthday-title {
    font-size: clamp(28px, 4.5vw, 64px);
    font-weight: 900;
    text-align: center;
    line-height: 1.2;
    background: linear-gradient(90deg, #ffe06e, #ff6ec7, #6ecfff, #ffe06e);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite 0.5s, pulse 2s ease-in-out infinite 0.3s;
    filter: drop-shadow(0 0 18px rgba(255,224,110,0.8));
    letter-spacing: 4px;
  }
  .sub-title {
    font-size: clamp(22px, 3.5vw, 52px);
    font-weight: 700;
    text-align: center;
    background: linear-gradient(90deg, #ffe06e, #ff6ec7, #a78bfa, #ffe06e);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite reverse, pulse 2s ease-in-out infinite 0.5s;
    filter: drop-shadow(0 0 15px rgba(255,224,110,0.8));
    letter-spacing: 3px;
  }
  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.04); }
  }

  /* ===== 生日蛋糕 ===== */
  .cake-wrap {
    position: relative;
    width: 180px;
    height: 220px;
    margin: 0 auto;
  }

  /* 蛋糕底座 */
  .cake-base {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 160px;
    height: 70px;
    background: linear-gradient(180deg, #f9a8d4 0%, #e879a8 100%);
    border-radius: 12px 12px 18px 18px;
    box-shadow: 0 6px 20px rgba(232,121,168,0.5);
  }
  .cake-base::before {
    content: '';
    position: absolute;
    top: 12px;
    left: 10px;
    right: 10px;
    height: 6px;
    background: rgba(255,255,255,0.45);
    border-radius: 3px;
  }
  .cake-base::after {
    content: '';
    position: absolute;
    top: 26px;
    left: 10px;
    right: 10px;
    height: 6px;
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
  }

  /* 蛋糕中层 */
  .cake-mid {
    position: absolute;
    bottom: 65px;
    left: 50%;
    transform: translateX(-50%);
    width: 130px;
    height: 55px;
    background: linear-gradient(180deg, #fde68a 0%, #fbbf24 100%);
    border-radius: 10px 10px 14px 14px;
    box-shadow: 0 4px 15px rgba(251,191,36,0.5);
  }
  .cake-mid::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 8px;
    right: 8px;
    height: 5px;
    background: rgba(255,255,255,0.4);
    border-radius: 3px;
  }

  /* 蛋糕顶层 */
  .cake-top {
    position: absolute;
    bottom: 115px;
    left: 50%;
    transform: translateX(-50%);
    width: 100px;
    height: 45px;
    background: linear-gradient(180deg, #a5f3fc 0%, #67e8f9 100%);
    border-radius: 8px 8px 10px 10px;
    box-shadow: 0 4px 12px rgba(103,232,249,0.5);
  }

  /* 奶油波浪 */
  .cream {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 0;
  }
  .cream-1 { bottom: 132px; width: 120px; }
  .cream-2 { bottom: 77px;  width: 150px; }
  .cream-3 { bottom: 22px;  width: 175px; }
  .cream svg { width: 100%; height: 20px; }

  /* 蜡烛 */
  .candle {
    position: absolute;
    bottom: 158px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
  }
  .candle-item {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .candle-body {
    width: 14px;
    height: 38px;
    border-radius: 3px;
    position: relative;
  }
  .candle-body::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 10px;
    background: #1a1a1a;
    border-radius: 1px;
    margin-top: -8px;
  }
  .c1 .candle-body { background: linear-gradient(180deg, #ff6b6b, #c0392b); }
  .c2 .candle-body { background: linear-gradient(180deg, #f9ca24, #f0932b); }
  .c3 .candle-body { background: linear-gradient(180deg, #a29bfe, #6c5ce7); }

  /* 火焰 */
  .flame-wrap {
    position: relative;
    width: 20px;
    height: 32px;
    margin-bottom: -4px;
  }
  .flame {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 26px;
    border-radius: 50% 50% 30% 30% / 60% 60% 40% 40%;
    animation: flicker var(--fspeed) ease-in-out infinite alternate;
    transform-origin: bottom center;
  }
  .flame-outer {
    background: radial-gradient(ellipse at 50% 80%, #fff176 0%, #ffb300 40%, #ff6d00 70%, transparent 100%);
    filter: blur(1px);
    width: 16px;
    height: 28px;
  }
  .flame-inner {
    background: radial-gradient(ellipse at 50% 70%, #ffffff 0%, #fff9c4 30%, #ffe082 60%, transparent 100%);
    width: 8px;
    height: 16px;
    bottom: 4px;
    filter: blur(0.5px);
  }
  .glow {
    position: absolute;
    bottom: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 28px;
    background: radial-gradient(circle, rgba(255,200,50,0.6) 0%, transparent 70%);
    animation: glowPulse var(--fspeed) ease-in-out infinite alternate;
    border-radius: 50%;
  }

  @keyframes flicker {
    0%   { transform: translateX(-50%) rotate(-6deg) scaleX(0.95) scaleY(1);   }
    20%  { transform: translateX(-50%) rotate(5deg)  scaleX(1.05) scaleY(0.97); }
    40%  { transform: translateX(-50%) rotate(-4deg) scaleX(0.92) scaleY(1.04); }
    60%  { transform: translateX(-50%) rotate(7deg)  scaleX(1.08) scaleY(0.95); }
    80%  { transform: translateX(-50%) rotate(-3deg) scaleX(0.96) scaleY(1.02); }
    100% { transform: translateX(-50%) rotate(4deg)  scaleX(1.03) scaleY(0.98); }
  }
  @keyframes glowPulse {
    0%   { opacity: 0.6; transform: translateX(-50%) scale(1);   }
    100% { opacity: 1;   transform: translateX(-50%) scale(1.3); }
  }

  /* 蛋糕整体浮动 */
  .cake-wrap {
    animation: cakeFloat 3s ease-in-out infinite;
  }
  @keyframes cakeFloat {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }

  /* ===== 音乐按钮 ===== */
  .music-btn {
    position: fixed;
    bottom: 24px;
    right: 28px;
    z-index: 999;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.4);
    color: #fff;
    font-size: 22px;
    width: 52px; height: 52px;
    border-radius: 50%;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: all 0.3s;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 18px rgba(255,110,199,0.4);
  }
  .music-btn:hover {
    background: rgba(255,255,255,0.25);
    transform: scale(1.1);
    box-shadow: 0 0 28px rgba(255,110,199,0.7);
  }
  /* 播放中：亮边框 */
  .music-btn.playing {
    border-color: #ff6ec7;
    box-shadow: 0 0 24px rgba(255,110,199,0.8);
  }

  /* 爱心装饰 */
  .hearts {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 3;
    overflow: hidden;
  }
  .heart {
    position: absolute;
    font-size: clamp(12px, 2vw, 24px);
    opacity: 0;
    animation: heartRise var(--hdur) linear infinite;
    animation-delay: var(--hdelay);
  }
  @keyframes heartRise {
    0%   { opacity: 0; transform: translateY(0) scale(0.5) rotate(-10deg); }
    15%  { opacity: 0.9; }
    80%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-100vh) scale(1.2) rotate(15deg); }
  }

  /* 自动播放提示 */
  .autoplay-tip {
    position: fixed;
    bottom: 84px;
    right: 20px;
    z-index: 999;
    background: rgba(255,110,199,0.18);
    border: 1px solid rgba(255,110,199,0.5);
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    backdrop-filter: blur(8px);
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.4s;
    pointer-events: none;
    white-space: nowrap;
  }
  .autoplay-tip.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

<!-- 星空 -->
<div class="stars" id="stars"></div>

<!-- 多语言生日快乐小字 -->
<div class="words-layer" id="wordsLayer"></div>

<!-- 彩带 -->
<div class="confetti-layer" id="confettiLayer"></div>

<!-- 爱心 -->
<div class="hearts" id="heartsLayer"></div>

<!-- 中心内容 -->
<div class="center">
  <!-- 第一行：姓名 -->
  <div class="main-title">郑云潇</div>

  <!-- 蛋糕 -->
  <div class="cake-wrap">
    <!-- 蜡烛 -->
    <div class="candle">
      <div class="candle-item c1">
        <div class="flame-wrap">
          <div class="flame flame-outer" style="--fspeed:0.38s"></div>
          <div class="flame flame-inner" style="--fspeed:0.38s"></div>
          <div class="glow" style="--fspeed:0.38s"></div>
        </div>
        <div class="candle-body"></div>
      </div>
      <div class="candle-item c2">
        <div class="flame-wrap">
          <div class="flame flame-outer" style="--fspeed:0.45s"></div>
          <div class="flame flame-inner" style="--fspeed:0.45s"></div>
          <div class="glow" style="--fspeed:0.45s"></div>
        </div>
        <div class="candle-body"></div>
      </div>
      <div class="candle-item c3">
        <div class="flame-wrap">
          <div class="flame flame-outer" style="--fspeed:0.33s"></div>
          <div class="flame flame-inner" style="--fspeed:0.33s"></div>
          <div class="glow" style="--fspeed:0.33s"></div>
        </div>
        <div class="candle-body"></div>
      </div>
    </div>

    <!-- 顶层 -->
    <div class="cake-top"></div>
    <!-- 奶油1 -->
    <div class="cream cream-1">
      <svg viewBox="0 0 120 20" preserveAspectRatio="none">
        <path d="M0,20 Q10,2 20,10 Q30,18 40,8 Q50,0 60,10 Q70,18 80,6 Q90,0 100,10 Q110,18 120,8 L120,20 Z"
              fill="#fff" opacity="0.92"/>
      </svg>
    </div>
    <!-- 中层 -->
    <div class="cake-mid"></div>
    <!-- 奶油2 -->
    <div class="cream cream-2">
      <svg viewBox="0 0 150 20" preserveAspectRatio="none">
        <path d="M0,20 Q12,2 24,10 Q36,18 48,7 Q60,0 72,10 Q84,18 96,5 Q108,0 120,10 Q132,18 150,6 L150,20 Z"
              fill="#fff" opacity="0.92"/>
      </svg>
    </div>
    <!-- 底层 -->
    <div class="cake-base"></div>
    <!-- 奶油3 -->
    <div class="cream cream-3">
      <svg viewBox="0 0 175 20" preserveAspectRatio="none">
        <path d="M0,20 Q14,2 28,10 Q42,18 56,6 Q70,0 84,10 Q98,18 112,4 Q126,0 140,10 Q155,18 175,6 L175,20 Z"
              fill="#fff" opacity="0.92"/>
      </svg>
    </div>
  </div>

  <!-- 第二行：生日快乐 -->
  <div class="birthday-title">生日快乐</div>
  <!-- 第三行：英文不变 -->
  <div class="sub-title">Happy Birthday Melody ✨</div>
</div>

<!-- 音乐按钮 -->
<button class="music-btn playing" id="musicBtn" title="关闭音乐">🔇</button>
<div class="autoplay-tip" id="autoplayTip">🎵 点击任意处开启音乐</div>

<script>
// ===== 星空 =====
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 180; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      --dur:${(Math.random()*2+1).toFixed(2)}s;
      animation-delay:${(Math.random()*3).toFixed(2)}s;
    `;
    container.appendChild(s);
  }
})();

// ===== 多语言生日快乐 =====
const birthdayWords = [
  { text: '生日快乐', color: '#ff6ec7' },
  { text: 'Happy Birthday', color: '#ffe06e' },
  { text: 'Joyeux Anniversaire', color: '#6ecfff' },
  { text: 'Feliz Cumpleaños', color: '#a78bfa' },
  { text: 'Alles Gute zum Geburtstag', color: '#ff8c69' },
  { text: 'Buon Compleanno', color: '#90ee90' },
  { text: 'С Днём Рождения', color: '#ffb347' },
  { text: 'お誕生日おめでとう', color: '#ff9ff3' },
  { text: '생일 축하해요', color: '#54a0ff' },
  { text: 'عيد ميلاد سعيد', color: '#ffd32a' },
  { text: 'जन्मदिन मुबारक', color: '#ff6b81' },
  { text: 'Parabéns', color: '#7efff5' },
  { text: 'Gelukkige Verjaardag', color: '#f9ca24' },
  { text: 'Gratulerer med dagen', color: '#e84393' },
  { text: 'Mutlu Yıllar', color: '#badc58' },
  { text: 'Grattis på födelsedagen', color: '#c7ecee' },
  { text: 'Tillykke med fødselsdagen', color: '#dfe6e9' },
  { text: 'Hyvää syntymäpäivää', color: '#fd79a8' },
  { text: 'יום הולדת שמח', color: '#fdcb6e' },
  { text: 'Chúc mừng sinh nhật', color: '#6ab04c' },
  { text: 'Selamat Ulang Tahun', color: '#e17055' },
  { text: 'Maligayang Kaarawan', color: '#00b894' },
  { text: 'สุขสันต์วันเกิด', color: '#d63031' },
  { text: 'Penblwydd Hapus', color: '#74b9ff' },
  { text: 'Boldog Születésnapot', color: '#a29bfe' },
  { text: '🎂🎉🎁✨💖🌟', color: '#ffffff' },
];

(function() {
  const layer = document.getElementById('wordsLayer');
  function getPos() {
    let x, y, attempts = 0;
    do {
      x = Math.random() * 90 + 5;
      y = Math.random() * 90 + 5;
      attempts++;
    } while (attempts < 20 && x > 25 && x < 75 && y > 25 && y < 75);
    return { x, y };
  }

  for (let i = 0; i < 60; i++) {
    const w = birthdayWords[i % birthdayWords.length];
    const el = document.createElement('div');
    el.className = 'word';
    const pos = getPos();
    const dur = (Math.random() * 6 + 5).toFixed(2);
    const delay = (Math.random() * 8).toFixed(2);
    el.style.cssText = `
      left:${pos.x}%;
      top:${pos.y}%;
      color:${w.color};
      --dur2:${dur}s;
      --delay:-${delay}s;
      font-size:${(Math.random()*10 + 11).toFixed(1)}px;
      text-shadow: 0 0 8px ${w.color};
    `;
    el.textContent = w.text;
    layer.appendChild(el);
  }
})();

// ===== 彩带 =====
(function() {
  const layer = document.getElementById('confettiLayer');
  const colors = ['#ff6ec7','#ffe06e','#6ecfff','#a78bfa','#ff8c69','#90ee90','#ffb347','#ff9ff3'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const dur = (Math.random() * 4 + 4).toFixed(2);
    const delay = (Math.random() * 6).toFixed(2);
    const dx = (Math.random() * 160 - 80).toFixed(0) + 'px';
    el.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      --dur3:${dur}s;
      --delay3:-${delay}s;
      --dx:${dx};
      transform: rotate(${Math.random()*360}deg);
    `;
    layer.appendChild(el);
  }
})();

// ===== 爱心 =====
(function() {
  const layer = document.getElementById('heartsLayer');
  const emojis = ['💖','💝','💕','🌟','✨','🎀','🌸','💫','🎊','🎉'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'heart';
    const dur = (Math.random() * 6 + 6).toFixed(2);
    const delay = (Math.random() * 8).toFixed(2);
    el.style.cssText = `
      left:${Math.random()*95}%;
      bottom:${Math.random()*20}%;
      --hdur:${dur}s;
      --hdelay:-${delay}s;
    `;
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    layer.appendChild(el);
  }
})();

// ===== 生日快乐钢琴曲 (Web Audio API) =====
// 默认自动播放，保留开关按钮
let audioCtx = null;
let isPlaying = false;
let stopRequested = false;
let currentTimeout = null;

const NOTE = {
  C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23,
  G4: 392.00, A4: 440.00, B4: 493.88,
  C5: 523.25, D5: 587.33, E5: 659.25, F5: 698.46,
  G5: 783.99, A5: 880.00,
  G3: 196.00, F3: 174.61, E3: 164.81
};

const melody = [
  [NOTE.C4, 0.35], [NOTE.C4, 0.18],
  [NOTE.D4, 0.55],
  [NOTE.C4, 0.55],
  [NOTE.F4, 0.55],
  [NOTE.E4, 1.0],

  [NOTE.C4, 0.35], [NOTE.C4, 0.18],
  [NOTE.D4, 0.55],
  [NOTE.C4, 0.55],
  [NOTE.G4, 0.55],
  [NOTE.F4, 1.0],

  [NOTE.C4, 0.35], [NOTE.C4, 0.18],
  [NOTE.C5, 0.55],
  [NOTE.A4, 0.55],
  [NOTE.F4, 0.55],
  [NOTE.E4, 0.55],
  [NOTE.D4, 1.0],

  [NOTE.A4, 0.35], [NOTE.A4, 0.18],
  [NOTE.A4, 0.55],
  [NOTE.F4, 0.55],
  [NOTE.G4, 0.55],
  [NOTE.F4, 1.1],
];

function playPianoNote(ctx, freq, startTime, duration, volume) {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const osc2 = ctx.createOscillator();
  const gain2 = ctx.createGain();

  osc.type = 'triangle';
  osc.frequency.value = freq;
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;

  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(volume, startTime + 0.015);
  gain.gain.exponentialRampToValueAtTime(volume * 0.6, startTime + duration * 0.3);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 1.1);

  gain2.gain.setValueAtTime(0, startTime);
  gain2.gain.linearRampToValueAtTime(volume * 0.3, startTime + 0.01);
  gain2.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.7);

  osc.connect(gain);
  osc2.connect(gain2);
  gain.connect(ctx.destination);
  gain2.connect(ctx.destination);

  osc.start(startTime);
  osc2.start(startTime);
  osc.stop(startTime + duration * 1.2);
  osc2.stop(startTime + duration * 1.2);
}

function playMelody() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // 若被浏览器挂起则恢复
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  stopRequested = false;

  function scheduleLoop() {
    if (stopRequested) return;
    let t = audioCtx.currentTime + 0.05;
    for (const [freq, dur] of melody) {
      playPianoNote(audioCtx, freq, t, dur, 0.22);
      t += dur * 1.05;
    }
    const totalDur = melody.reduce((s, [, d]) => s + d * 1.05, 0);
    currentTimeout = setTimeout(() => {
      if (!stopRequested) scheduleLoop();
    }, (totalDur - 0.3) * 1000);
  }
  scheduleLoop();
  isPlaying = true;
}

function stopMelody() {
  stopRequested = true;
  if (currentTimeout) clearTimeout(currentTimeout);
  isPlaying = false;
}

const btn = document.getElementById('musicBtn');
const tip = document.getElementById('autoplayTip');

function setPlayingUI(playing) {
  if (playing) {
    btn.textContent = '🔇';
    btn.title = '关闭音乐';
    btn.classList.add('playing');
  } else {
    btn.textContent = '🎵';
    btn.title = '开启音乐';
    btn.classList.remove('playing');
  }
}

btn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (isPlaying) {
    stopMelody();
    setPlayingUI(false);
  } else {
    playMelody();
    setPlayingUI(true);
  }
});

// ===== 自动播放逻辑 =====
// 尝试直接自动播放（部分浏览器允许）
function tryAutoPlay() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'running') {
      // 浏览器允许直接播放
      playMelody();
      setPlayingUI(true);
    } else {
      // 需要用户交互才能播放，显示提示
      audioCtx.suspend();
      setPlayingUI(false);
      showTip();
    }
  } catch(e) {
    setPlayingUI(false);
    showTip();
  }
}

function showTip() {
  tip.classList.add('show');
  setTimeout(() => tip.classList.remove('show'), 3500);
}

// 用户首次点击页面时自动开始播放
function onFirstInteraction() {
  if (!isPlaying) {
    playMelody();
    setPlayingUI(true);
  }
  document.removeEventListener('click', onFirstInteraction);
  document.removeEventListener('touchstart', onFirstInteraction);
}
document.addEventListener('click', onFirstInteraction);
document.addEventListener('touchstart', onFirstInteraction);

// 页面加载后尝试自动播放
window.addEventListener('load', tryAutoPlay);
</script>
